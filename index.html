<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/shiprlift.png"/> -->
    <link rel="icon" type="image/svg+xml" href="/loge.png"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shiprlift</title>

    <!-- Hide Google top banner -->
    <style>
      .goog-te-banner-frame {
        display: none !important;
      }
      body {
        top: 0px !important;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- Hidden Google Translate gadget -->
    <div id="google_translate_element" style="position: absolute; top: -9999px;"></div>

    <!-- Initialize Google Translate -->
    <script>
      function googleTranslateElementInit() {
        new window.google.translate.TranslateElement(
          {
            pageLanguage: "en",
            autoDisplay: false,
          },
          "google_translate_element"
        );
      }
    </script>

    <!-- Load Google Translate script -->
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <!-- React entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
